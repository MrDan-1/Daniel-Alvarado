<!DOCTYPE html> <!-- Declares HTML5 document -->
<html lang="en"> <!-- Root element, English language -->

<head> <!-- Head section, not visible -->
    <meta charset="UTF-8"> <!-- Sets character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive on mobile -->
    <title>Weather App</title> <!-- Browser tab title -->
    <link rel="stylesheet" href="style.css"> <!-- Links our CSS file -->
</head>

<body> <!-- Visible page content -->

<div class="container"> <!-- Main wrapper div -->

    <h1 class="title">Weather App</h1> <!-- App title heading -->

    <!-- Search Section -->
    <div class="search-box"> <!-- Search bar wrapper -->
        <input type="text" id="cityInput" class="city-input" placeholder="Enter city name..." /> <!-- Input field -->
        <button id="searchBtn" class="search-btn">Search</button> <!-- Search trigger button -->
        <button id="toggleUnit" class="toggle-btn">°C</button> <!-- Toggle fahrenheit celsius button -->
    </div>

    <!-- Weather Layout Side by Side -->
    <div class="weather-layout"> <!-- Wrapper for side by side -->

        <!-- Weather Display Section -->
        <div class="weather-card" id="weatherCard"> <!-- Card to show weather -->
            <div class="weather-icon" id="weatherIcon">🌤️</div> <!-- Dynamic weather emoji icon -->
            <h2 class="city-name" id="cityName">City Name</h2> <!-- Displays searched city -->
            <p class="local-time" id="localTime">🕒 --:-- --</p> <!-- Shows local time of city -->
            <p class="temperature" id="temperature">--°F</p> <!-- Shows temperature -->
            <p class="condition" id="condition">Condition</p> <!-- Shows weather condition -->
            <p class="humidity" id="humidity">Humidity: --%</p> <!-- Shows humidity percent -->
            <p class="wind" id="wind">Wind: -- mph</p> <!-- Shows wind speed -->
            <p class="uv-index" id="uvIndex">UV Index: --</p> <!-- Shows UV index value -->
        </div> <!-- End weather card -->

        <!-- 5 Day Forecast Section -->
        <div class="forecast-container" id="forecastContainer"> <!-- Forecast wrapper -->
            <h3 class="forecast-title">5-Day Forecast</h3> <!-- Forecast heading -->
            <div class="forecast-cards" id="forecastCards"></div> <!-- Forecast cards go here -->
        </div> <!-- End forecast container -->

    </div> <!-- End weather layout -->

    <!-- Error Message -->
    <p class="error-msg" id="errorMsg"></p> <!-- Shows error if city not found -->

</div> <!-- End container -->

<script src="app.js"></script> <!-- Links our JavaScript file -->

</body> <!-- End body -->

</html> <!-- End HTML document -->
